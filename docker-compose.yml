services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: respiratory_diagnostics_app
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: respiratory_diagnostics_nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
